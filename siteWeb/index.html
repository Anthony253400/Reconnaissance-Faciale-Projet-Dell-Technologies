<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Face Recognition</title>
</head>
<body>

    <h1>Face Recognition</h1>

    <!-- ── WEBCAM SECTION ── -->
    <h2>Add picture from the Webcam</h2>

    <!-- video tag displays the webcam stream -->
    <video id="webcam" autoplay playsinline width="640" height="480"></video>

    <!-- hidden canvas — used to capture a frame from the video -->
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

    <br/>
    <button onclick="takePicture()">Take picture</button>

    <!-- shows the captured photo -->
    <img id="preview" width="200" style="display:none; margin-top:8px;" />


    <!-- ── ADD PERSON SECTION ── -->
    <h2>Add a person from existing picture</h2>

    <label>First name: </label>
    <input type="text" id="firstName" placeholder="John" />

    <br/><br/>

    <label>Last name: </label>
    <input type="text" id="lastName" placeholder="Doe" />

    <br/><br/>

    <!-- file input — alternative to taking a picture -->
    <label>Or upload a photo: </label>
    <input type="file" id="photo" accept="image/*" />

    <br/><br/>

    <button onclick="addPerson()">Add to database</button>

    <!-- confirmation message -->
    <p id="message"></p>

    <script src="script.js"></script>

</body>
</html>
