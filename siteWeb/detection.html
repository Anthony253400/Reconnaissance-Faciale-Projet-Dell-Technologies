<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Face Recognition — Detect</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* riquadro originale — invariato */
        .detection-wrapper {
            position: relative;
            width: 640px;
            height: 480px;
        }
        .detection-wrapper video,
        .detection-wrapper canvas {
            position: absolute;
            top: 0; left: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div class="container">

    <header class="page-header">
        <h1>Face Recognition</h1>
        <p class="subtitle">Real-time face detection</p>
    </header>

    <div class="section-card">
        <h2>Detect Faces</h2>

        <div class="detection-wrapper">
            <img id="feed" style="border-radius: 8px; max-width: 100%;">
        </div>

        <canvas id="capture" width="640" height="480" style="display:none;"></canvas>

        <div class="btn-row">
            <a href="index.html" class="btn btn-secondary">Back to Add Person</a>
        </div>
    </div>

    <div class="footer">
        <p>Project curricular internship 2026 by Anthony Miranda and Lea Carminati for Dell Technologies Montpellier</p>   
    </div>

</div>
<script src="vidéo.js"></script>
</body>
</html>
