<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Face Recognition</title>
</head>
<style>
    .container {
    position: relative;  
    width: 640px;
    height: 480px;
}

video, canvas {
    position: absolute;  
    top: 0;
    left: 0;
    pointer-events: none;
}
</style>
<body>

    <h1>Face Recognition</h1>

    <!-- ── WEBCAM SECTION ── -->
    <h2>Detect Faces</h2>
    <div class="container">
    
    <!-- video tag displays the webcam stream -->
    <video id="webcam" autoplay playsinline width="640" height="480"></video>
    <!-- canvas tag displays the overlay with bounding boxes -->
    <canvas id="overlay" width="640" height="480"></canvas>
    </div>
    <!-- hidden canvas used to capture a frame from the video -->
    <canvas id="capture" width="640" height="480" style="display:none;"></canvas>

    <script src="detection.js"></script>

</body>
</html>
